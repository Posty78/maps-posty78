<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navigation — 1500 Macdo</title>
  <link rel="icon" type="image/svg+xml" href="./favicon-nav.svg" />
  <style>
    :root {
      --bg: #0a0a0a;
      --green: #00cc44;
      --white: #ffffff;
      --muted: #557755;
      --font: "Inter", system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 24px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .counter {
      font-size: 48px;
      font-weight: 900;
      font-family: monospace;
      color: var(--white);
    }

    .counter span { color: var(--green); }

    .mcdo-name {
      font-size: 28px;
      font-weight: 800;
      color: var(--white);
      text-align: center;
      text-transform: uppercase;
    }

    .mcdo-coords {
      font-size: 13px;
      color: var(--muted);
      font-family: monospace;
    }

    .btn-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      max-width: 400px;
      height: 64px;
      background: var(--green);
      color: #000;
      font-size: 18px;
      font-weight: 800;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      text-decoration: none;
    }

    .btn-waze {
      background: #33ccff;
      color: #000;
    }

    .btn-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 400px;
    }

    .btn-prev-next {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 400px;
    }

    .btn-prev, .btn-next {
      flex: 1;
      height: 52px;
      background: rgba(0,204,68,0.1);
      border: 2px solid var(--green);
      border-radius: 12px;
      color: var(--green);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .next-info {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    .next-info span { color: var(--white); font-weight: 600; }
  </style>
</head>
<body>

  <h1>🍟 Navigation 1500 Macdo</h1>

  <div class="counter">
    <span id="current-num">—</span> / 1500
  </div>

  <div class="mcdo-name" id="mcdo-name">Chargement...</div>
  <div class="mcdo-coords" id="mcdo-coords"></div>

  <div class="btn-row">
    <a id="btn-gmaps" class="btn-nav" href="#" target="_blank">
      🗺️ Google Maps
    </a>
    <a id="btn-waze" class="btn-nav btn-waze" href="#" target="_blank">
      🚗 Waze
    </a>
  </div>

  <div class="btn-prev-next">
    <button class="btn-prev" onclick="go(-1)">← Précédent</button>
    <button class="btn-next" onclick="go(+1)">Suivant →</button>
  </div>

  <div class="next-info">
    Prochain : <span id="next-name">—</span>
  </div>

<script>
  let mcdo = [];
  let index = parseInt(localStorage.getItem('mcdo-index') || '0');

  fetch('./assets/mcdo_1500_points.geojson')
    .then(r => r.json())
    .then(data => {
      mcdo = data.features;
      render();
    });

  function render() {
    if (!mcdo.length) return;
    const f = mcdo[index];
    const next = mcdo[index + 1];
    const [lon, lat] = f.geometry.coordinates;
    const name = f.properties.name || `McDo #${index + 1}`;

    document.getElementById('current-num').textContent = index + 1;
    document.getElementById('mcdo-name').textContent = name;
    document.getElementById('mcdo-coords').textContent = `${lat.toFixed(5)}, ${lon.toFixed(5)}`;

    document.getElementById('btn-gmaps').href =
      `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}&travelmode=driving`;

    document.getElementById('btn-waze').href =
      `https://waze.com/ul?ll=${lat},${lon}&navigate=yes`;

    document.getElementById('next-name').textContent =
      next ? (next.properties.name || `McDo #${index + 2}`) : 'ARRIVÉE ! 🏆';
  }

  function go(dir) {
    const newIndex = index + dir;
    if (newIndex < 0 || newIndex >= mcdo.length) return;
    index = newIndex;
    localStorage.setItem('mcdo-index', index);
    render();
  }
</script>

</body>
</html>
