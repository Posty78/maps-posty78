```html
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tour de France des 1500 McDo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html,body{
margin:0;
height:100%;
font-family:Arial,sans-serif;
background:#111;
}

#header{
height:70px;
background:#181818;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 25px;
font-size:18px;
font-weight:bold;
}

#map{
height:calc(100vh - 70px);
width:100%;
}

#toggleMcdo{
position:absolute;
top:90px;
right:15px;
z-index:9999;
background:white;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
box-shadow:0 0 10px rgba(0,0,0,.3);
}

</style>

</head>

<body>

<div id="header">
<div>Tour de France des 1500 McDo</div>
<div id="progress">Chargement...</div>
</div>

<div id="map"></div>

<div id="toggleMcdo">📍 Masquer les McDo</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAMpcR8oV6kCDPHwoPiCZky8JriA9TiRuc",
  authDomain: "posty78-maps.firebaseapp.com",
  projectId: "posty78-maps",
  storageBucket: "posty78-maps.firebasestorage.app",
  messagingSenderId: "264681377127",
  appId: "1:264681377127:web:59cc8c638a03c0ef9cb3c2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const map = L.map('map').setView([46.6,2.2],6);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19,
attribution:'© OpenStreetMap'
}
).addTo(map);

const snap = await getDoc(doc(db,"project","status"));

if(snap.exists()){
document.getElementById("progress").innerText =
snap.data().currentMcdo + " / 1500";
}

let coucheMcdo = null;

fetch('mcdo_1500_trace_final.geojson')
.then(r => r.json())
.then(data => {

    coucheMcdo = L.geoJSON(data, {

        onEachFeature: function(feature, layer){

            let titre = "McDo";

            if(feature.properties){
                titre =
                    feature.properties.name ||
                    feature.properties.Name ||
                    feature.properties.nom ||
                    "McDo";
            }

            layer.bindPopup(titre);

        }

    });

    coucheMcdo.addTo(map);

});

document.getElementById("toggleMcdo").onclick = function(){

    if(!coucheMcdo) return;

    if(map.hasLayer(coucheMcdo)){
        map.removeLayer(coucheMcdo);
        this.innerHTML = "📍 Afficher les McDo";
    }else{
        map.addLayer(coucheMcdo);
        this.innerHTML = "📍 Masquer les McDo";
    }

};

</script>

</body>
</html>
```
