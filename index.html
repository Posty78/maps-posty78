<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tour de France des 1500 McDo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

html,body{
margin:0;
height:100%;
font-family:Arial,sans-serif;
background:#111;
color:white;
}

#header{
height:80px;
background:#181818;
border-bottom:1px solid #333;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
}

#title{
font-size:28px;
font-weight:bold;
}

#map{
height:calc(100vh - 80px);
width:100%;
}

</style>
</head>

<body>

<div id="header">
<div id="title">Tour de France des 1500 McDo</div>
<div>0 / 1500</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map');

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

map.setView([46.6,2.2],6);

</script>

</body>
</html>
