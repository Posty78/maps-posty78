<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Tour de France des 1500 McDo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

html,body{
margin:0;
height:100%;
font-family:Arial,sans-serif;
background:#111;
}

#header{
height:70px;
background:#181818;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 25px;
font-size:18px;
font-weight:bold;
}

#map{
height:calc(100vh - 70px);
width:100%;
}

</style>
</head>

<body>

<div id="header">
<div>Tour de France des 1500 McDo</div>
<div id="progress">Chargement...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const map = L.map('map').setView([46.6,2.2],6);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

const snap = await getDoc(doc(db,"project","status"));

if(snap.exists()){
document.getElementById("progress").innerText =
snap.data().currentMcdo + " / 1500";
}

</script>

</body>
</html>
