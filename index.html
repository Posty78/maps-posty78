<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tour de France des 1500 McDo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
margin:0;
height:100%;
font-family:Arial,sans-serif;
background:#111;
}

#header{
height:70px;
background:#181818;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 25px;
font-size:18px;
font-weight:bold;
}

#map{
height:calc(100vh - 70px);
width:100%;
}
</style>
</head>

<body>

<div id="header">
<div>Tour de France des 1500 McDo</div>
<div>1 / 1500</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([46.6,2.2],6);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19,
attribution:'© OpenStreetMap'
}
).addTo(map);

fetch('mcdo_1500_trace_final.geojson')
.then(r => r.json())
.then(data => {

    const layer = L.geoJSON(data);

    layer.addTo(map);

});

</script>

</body>
</html>
