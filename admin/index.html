<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Tour de France McDonald's</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>

<div class="admin-card">

  <div class="admin-header">
    <span class="admin-eyebrow">Administration</span>
    <h1 class="admin-title">Tour de France McDonald's</h1>
  </div>

  <div class="admin-body">

    <div id="admin-login">
      <input
        id="admin-password"
        type="password"
        class="admin-input"
        placeholder="Mot de passe"
        autocomplete="current-password"
      />
      <button id="btn-login" class="btn-primary">Connexion</button>
      <p id="login-error" class="admin-feedback is-error" style="display:none;">
        Mot de passe incorrect.
      </p>
    </div>

    <div id="admin-panel" style="display:none; flex-direction:column; gap:16px;">

      <div class="admin-stat">
        <p class="admin-stat__label">McDonald's actuel</p>
        <p id="admin-current" class="admin-stat__value">—</p>
        <p class="admin-stat__sub">sur 1500</p>
      </div>

      <button id="btn-validate" class="btn-success" disabled>
        ✅ Valider ce McDonald's
      </button>

      <p id="admin-feedback" class="admin-feedback"></p>

    </div>

  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, updateDoc, increment, onSnapshot }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyAMpcR8oV6kCDPHwoPiCZky8JriA9TiRuc",
    authDomain:        "posty78-maps.firebaseapp.com",
    projectId:         "posty78-maps",
    storageBucket:     "posty78-maps.firebasestorage.app",
    messagingSenderId: "264681377127",
    appId:             "1:264681377127:web:59cc8c638a03c0ef9cb3c2",
  };

  const ADMIN_PASSWORD = "mcdo1500";
  const TOTAL          = 1500;

  const app  = initializeApp(FIREBASE_CONFIG);
  const db   = getFirestore(app);
  const ref  = doc(db, "project", "status");

  const loginSection  = document.getElementById("admin-login");
  const adminPanel    = document.getElementById("admin-panel");
  const passwordInput = document.getElementById("admin-password");
  const btnLogin      = document.getElementById("btn-login");
  const loginError    = document.getElementById("login-error");
  const adminCurrent  = document.getElementById("admin-current");
  const btnValidate   = document.getElementById("btn-validate");
  const feedback      = document.getElementById("admin-feedback");

  let currentMcdo = 0;

  function login() {
    if (passwordInput.value === ADMIN_PASSWORD) {
      loginSection.style.display = "none";
      adminPanel.style.display   = "flex";
      startListener();
    } else {
      loginError.style.display = "block";
      passwordInput.value = "";
      passwordInput.focus();
    }
  }

  btnLogin.addEventListener("click", login);
  passwordInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") login();
  });

  function startListener() {
    onSnapshot(ref, (snap) => {
      if (!snap.exists()) return;
      currentMcdo = snap.data()?.currentMcdo ?? 0;
      adminCurrent.textContent = currentMcdo;
      btnValidate.disabled     = currentMcdo >= TOTAL;
    });
  }

  btnValidate.addEventListener("click", async () => {
    btnValidate.disabled = true;
    feedback.className   = "admin-feedback";
    feedback.textContent = "";

    try {
      await updateDoc(ref, { currentMcdo: increment(1) });
      feedback.textContent = `✅ McDonald's n°${currentMcdo + 1} validé !`;
      feedback.classList.add("is-success");
    } catch (err) {
      console.error("[admin]", err);
      feedback.textContent = "Erreur lors de la mise à jour.";
      feedback.classList.add("is-error");
      btnValidate.disabled = false;
    }

    setTimeout(() => {
      feedback.className   = "admin-feedback";
      feedback.textContent = "";
    }, 3000);
  });
</script>

</body>
</html>
